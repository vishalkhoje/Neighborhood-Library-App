services:
  db:
    image: postgres:15
    env_file:
      - backend/.env
    ports:
      - "5433:5432"
    volumes:                      
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file:
      - backend/.env
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    image: localhost/library-app-frontend
    ports:
      - "3000:3000"

volumes:
  postgres_data: